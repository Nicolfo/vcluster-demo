# External-DNS for the xeon-local host cluster.
#
# Watches Ingress objects and creates one proxied Cloudflare CNAME per host,
# all pointing at the existing tunnel (<tunnel-id>.cfargotunnel.com).
#
# Scoping (important):
#   --label-filter vcluster.loft.sh/managed-by  -> ONLY manages Ingresses that
#       vcluster syncs from inside a virtual cluster. Host-native Ingresses
#       (e.g. chat.nicolfo.it / open-webui) are NOT touched.
#   --domain-filter nicolfo.it                   -> never edits other zones.
#   registry=txt + owner-id                      -> only deletes records it created.
#
# The API token is provided via the secret `cloudflare-api-token` (key=token),
# created by scripts/08-deploy-external-dns.sh.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-dns
  namespace: external-dns
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: external-dns
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "pods", "nodes"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: external-dns
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: external-dns
subjects:
  - kind: ServiceAccount
    name: external-dns
    namespace: external-dns
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns
  namespace: external-dns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: external-dns
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: external-dns
    spec:
      serviceAccountName: external-dns
      containers:
        - name: external-dns
          image: registry.k8s.io/external-dns/external-dns:v0.15.0
          args:
            - --source=ingress
            - --provider=cloudflare
            - --domain-filter=nicolfo.it
            - --label-filter=vcluster.loft.sh/managed-by
            - --default-targets=82051912-b874-49e9-955b-7a73552b75bc.cfargotunnel.com
            - --cloudflare-proxied
            - --policy=sync
            - --registry=txt
            - --txt-owner-id=external-dns-xeon
            - --txt-prefix=edns-
            - --interval=1m
            - --log-level=info
          env:
            - name: CF_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflare-api-token
                  key: token
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { memory: 128Mi }
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
